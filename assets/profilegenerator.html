<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arguuu | Canvas Customizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@100..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400..900&family=Syncopate:wght@400;700&family=Dancing+Script:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Anton&family=Orbitron:wght@400..900&family=Abril+Fatface&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --panel-bg: #141418;
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent: #c4724a;
            --accent-glow: rgba(196, 114, 74, 0.3);
            --text-main: #e2e2e7;
            --text-dim: #8e8e93;
            --white: #ffffff;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            z-index: 10;
        }

        .logo {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* --- Preview Section --- */
        .preview-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a20 0%, #0a0a0c 100%);
            position: relative;
        }

        .canvas-container {
            position: relative;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: var(--panel-bg);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px var(--panel-border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        #pfpCanvas {
            border-radius: 50%;
            width: 100%;
            height: 100%;
        }

        .json-output {
            width: 80%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: #10b981;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 150px;
        }

        .json-output::-webkit-scrollbar { width: 4px; }
        .json-output::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }

        /* --- Controls Section --- */
        .controls-section {
            flex: 1;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
        }

        .tabs-header {
            display: flex;
            padding: 20px 20px 0;
            gap: 10px;
            border-bottom: 1px solid var(--panel-border);
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .panels-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .panel { display: none; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .control-group { margin-bottom: 30px; }
        .control-group label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        /* --- Selectors Grid --- */
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 12px;
        }

        .style-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
        }

        .style-item:hover { border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); }
        .style-item.active { border-color: var(--accent); background: var(--accent-glow); }

        .style-item span { font-size: 8px; font-family: 'DM Mono', monospace; text-align: center; color: var(--text-dim); }
        .style-item.active span { color: var(--accent); }

        /* --- Color Picker --- */
        .color-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: var(--white); box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* --- Inputs --- */
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: 'DM Mono', monospace;
            outline: none;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: var(--panel-border);
            border-radius: 2px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- Scrollbar --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
    </style>
</head>
<body>
    <header>
        <div class="logo">Canvas / Profile</div>
        <div style="display: flex; gap: 15px;">
            <button class="tab-btn" onclick="copyJSON()" style="border: 1px solid var(--panel-border); border-radius: 8px; padding: 8px 16px; display: flex; align-items: center; gap: 8px;">
                <i data-feather="copy" style="width: 14px; height: 14px;"></i>
                COPY JSON
            </button>
        </div>
    </header>

    <main>
        <section class="preview-section">
            <div class="canvas-container">
                <canvas id="pfpCanvas" width="800" height="800"></canvas>
            </div>
            <div class="json-output" id="jsonOutput"></div>
        </section>

        <section class="controls-section">
            <div class="tabs-header">
                <button class="tab-btn active" data-tab="bg">BG</button>
                <button class="tab-btn" data-tab="shape">SHAPE</button>
                <button class="tab-btn" data-tab="text">TEXT</button>
                <button class="tab-btn" data-tab="ring">RING</button>
                <button class="tab-btn" data-tab="accent">ACCENT</button>
            </div>

            <div class="panels-container">
                <!-- BG Panel -->
                <div class="panel active" id="panel-bg">
                    <div class="control-group">
                        <label>Background Style</label>
                        <div class="style-grid" id="bg-style-grid"></div>
                    </div>
                    <div class="control-group">
                        <label>Primary Color</label>
                        <div class="color-grid" id="color1-grid"></div>
                    </div>
                    <div class="control-group">
                        <label>Secondary Color</label>
                        <div class="color-grid" id="color2-grid"></div>
                    </div>
                </div>

                <!-- Shape Panel -->
                <div class="panel" id="panel-shape">
                    <div class="control-group">
                        <label>Overlay Shape</label>
                        <div class="style-grid" id="shape-grid"></div>
                    </div>
                    <div class="control-group">
                        <label>Shape Size</label>
                        <input type="range" id="shape-size" min="20" max="90" value="65">
                    </div>
                    <div class="control-group">
                        <label>Shape Color</label>
                        <div class="color-grid" id="shape-color-grid"></div>
                    </div>
                </div>

                <!-- Text Panel -->
                <div class="panel" id="panel-text">
                    <div class="control-group">
                        <label>Initials</label>
                        <input type="text" id="initials-input" maxlength="3" placeholder="ABC">
                    </div>
                    <div class="control-group">
                        <label>Font Style</label>
                        <div class="style-grid" id="font-grid"></div>
                    </div>
                    <div class="control-group">
                        <label>Text Colors (L1 / L2 / L3)</label>
                        <div style="display: flex; gap: 15px;">
                            <div class="color-grid" id="text-color1-grid"></div>
                        </div>
                        <div style="margin-top: 10px; display: flex; gap: 15px;">
                            <div class="color-grid" id="text-color2-grid"></div>
                        </div>
                        <div style="margin-top: 10px; display: flex; gap: 15px;">
                            <div class="color-grid" id="text-color3-grid"></div>
                        </div>
                    </div>
                </div>

                <!-- Ring Panel -->
                <div class="panel" id="panel-ring">
                    <div class="control-group">
                        <label>Ring Style</label>
                        <div class="style-grid" id="ring-grid"></div>
                    </div>
                    <div class="control-group">
                        <label>Ring Color</label>
                        <div class="color-grid" id="ring-color-grid"></div>
                    </div>
                </div>

                <!-- Accent Panel -->
                <div class="panel" id="panel-accent">
                    <div class="control-group">
                        <label>Overlay Accent</label>
                        <div class="style-grid" id="accent-grid"></div>
                    </div>
                    <div class="control-group">
                        <label>Accent Color</label>
                        <div class="color-grid" id="accent-color-grid"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        feather.replace();

        // --- Data & Constants ---
        const colors = [
            '#8FA491', '#E2E7E1', '#24292E', '#4A5559', '#F2EFE9', '#DFD7CC', '#633939', '#9E7B7B',
            '#C4724A', '#A85535', '#5C3D2E', '#2A1F17', '#E8DDD0', '#C9B99E', '#FAF6F0', '#F5E6D0',
            '#4A7C8E', '#2D5A6B', '#7EB89A', '#3D7A5C', '#9B6B8A', '#6B3D5C', '#C4A84A', '#8E7235',
            '#E05C5C', '#8E2222', '#5C78C4', '#2B4FA8', '#1A1A1A', '#555555', '#999999', '#FFFFFF',
            '#E8A0B4', '#D4607A', '#C94080', '#F2C4CE', '#B5315A', '#FF85A1', '#9B72CF', '#6A3D9A',
            '#C9A0DC', '#4B0082', '#D8B4FE', '#7C3AED', '#4A90D9', '#1E40AF', '#0EA5E9', '#93C5FD',
            '#1E3A5F', '#38BDF8', '#0D9488', '#06B6D4', '#5EEAD4', '#A7F3D0', '#22C55E', '#15803D',
            '#86EFAC', '#365314', '#BBF7D0', '#4ADE80', '#FBBF24', '#EAB308', '#FEF08A', '#CA8A04',
            '#F97316', '#EA580C', '#C2410C', '#EF4444', '#991B1B', '#FCA5A5', '#DC2626', '#7F1D1D'
        ];

        const bgStyles = ['solid', 'split_h', 'split_v', 'diagonal', 'radial', 'stripes', 'circles', 'grid', 'dots_grid', 'waves', 'half_moon', 'corner', 'mesh'];
        const shapes = ['none', 'circle', 'square', 'triangle', 'diamond', 'hexagon', 'star', 'cross', 'heart', 'burst_small', 'cloud', 'infinity', 'leaf', 'octogon'];
        const fonts = ['serif', 'sans', 'editorial', 'migra', 'sausage', 'monument', 'montreal', 'ramona', 'playwrite', 'dancing', 'garamond', 'anton', 'orbitron', 'abril', 'spaceMono'];
        const rings = ['none', 'solid', 'dashed', 'double', 'dots', 'triple', 'brackets', 'corners', 'zigzag', 'notched', 'inner_glow', 'spiral_dots'];
        const accents = ['none', 'sparkle', 'dot3', 'leaf', 'arrow', 'burst', 'star', 'flame', 'diamond_f', 'diamond_o', 'circle_f', 'circle_o', 'bow', 'leaf_v', 'blossom', 'burst_d', 'burst_s', 'star_o'];

        const fontMap = {
            serif: 'Lora, serif',
            sans: 'Inter, sans-serif',
            editorial: 'Fraunces, serif',
            migra: 'Cinzel, serif', // Closest to Migra in Google Fonts
            sausage: 'Inter, sans-serif', // Substitute
            monument: 'Syncopate, sans-serif',
            montreal: 'Space Mono, monospace',
            ramona: 'Inter, sans-serif', // Substitute
            playwrite: 'Dancing Script, cursive', // Substitute
            dancing: 'Dancing Script, cursive',
            garamond: 'EB Garamond, serif',
            anton: 'Anton, sans-serif',
            orbitron: 'Orbitron, sans-serif',
            abril: 'Abril Fatface, serif',
            spaceMono: 'Space Mono, monospace'
        };

        // --- State ---
        let customization = {
            bgStyle: 'split_v',
            color1: '#c4724a',
            color2: '#2a1f17',
            shape: 'none',
            shapeColor: '#faf6f0',
            shapeSize: 65,
            initials: 'NEW',
            font: 'migra',
            textColor1: '#ffffff',
            textColor2: '#ffffff',
            textColor3: '#ffffff',
            accent: 'none',
            accentColor: '#faf6f0',
            ring: 'dashed',
            ringColor: '#faf6f0'
        };

        // --- Initialization ---
        function init() {
            setupTabs();
            populateGrids();
            setupInputs();
            render();
        }

        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn[data-tab]');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
                });
            });
        }

        function populateGrids() {
            // BG Styles
            const bgGrid = document.getElementById('bg-style-grid');
            bgStyles.forEach(s => {
                const item = createStyleItem(s, s.replaceAll('_', ' '));
                item.onclick = () => { customization.bgStyle = s; update(); };
                bgGrid.appendChild(item);
            });

            // Shapes
            const shapeGrid = document.getElementById('shape-grid');
            shapes.forEach(s => {
                const item = createStyleItem(s, s);
                item.onclick = () => { customization.shape = s; update(); };
                shapeGrid.appendChild(item);
            });

            // Fonts
            const fontGrid = document.getElementById('font-grid');
            fonts.forEach(f => {
                const item = createStyleItem(f, f);
                item.style.fontFamily = fontMap[f];
                item.onclick = () => { customization.font = f; update(); };
                fontGrid.appendChild(item);
            });

            // Rings
            const ringGrid = document.getElementById('ring-grid');
            rings.forEach(r => {
                const item = createStyleItem(r, r);
                item.onclick = () => { customization.ring = r; update(); };
                ringGrid.appendChild(item);
            });

            // Accents
            const accentGrid = document.getElementById('accent-grid');
            accents.forEach(a => {
                const item = createStyleItem(a, a.replaceAll('_', ' '));
                item.onclick = () => { customization.accent = a; update(); };
                accentGrid.appendChild(item);
            });

            // Color Pickers
            setupColorPicker('color1-grid', 'color1');
            setupColorPicker('color2-grid', 'color2');
            setupColorPicker('shape-color-grid', 'shapeColor');
            setupColorPicker('text-color1-grid', 'textColor1');
            setupColorPicker('text-color2-grid', 'textColor2');
            setupColorPicker('text-color3-grid', 'textColor3');
            setupColorPicker('ring-color-grid', 'ringColor');
            setupColorPicker('accent-color-grid', 'accentColor');
        }

        function createStyleItem(id, label) {
            const div = document.createElement('div');
            div.className = 'style-item';
            div.dataset.id = id;
            div.innerHTML = `<span>${label.toUpperCase()}</span>`;
            return div;
        }

        function setupColorPicker(gridId, key) {
            const grid = document.getElementById(gridId);
            colors.forEach(c => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = c;
                swatch.onclick = () => { customization[key] = c; update(); };
                grid.appendChild(swatch);
            });
        }

        function setupInputs() {
            document.getElementById('shape-size').oninput = (e) => {
                customization.shapeSize = parseFloat(e.target.value);
                update();
            };
            document.getElementById('initials-input').oninput = (e) => {
                customization.initials = e.target.value.toUpperCase();
                update();
            };
            document.getElementById('initials-input').value = customization.initials;
        }

        function update() {
            render();
            updateUIState();
            updateJSON();
        }

        function updateUIState() {
            // Update active states in grids
            document.querySelectorAll('.style-item').forEach(item => {
                const parent = item.parentElement.id;
                if (parent === 'bg-style-grid' && item.dataset.id === customization.bgStyle) item.classList.add('active');
                else if (parent === 'shape-grid' && item.dataset.id === customization.shape) item.classList.add('active');
                else if (parent === 'font-grid' && item.dataset.id === customization.font) item.classList.add('active');
                else if (parent === 'ring-grid' && item.dataset.id === customization.ring) item.classList.add('active');
                else if (parent === 'accent-grid' && item.dataset.id === customization.accent) item.classList.add('active');
                else item.classList.remove('active');
            });

            // Update active swatches
            const keys = ['color1', 'color2', 'shapeColor', 'textColor1', 'textColor2', 'textColor3', 'ringColor', 'accentColor'];
            keys.forEach(key => {
                const grid = document.getElementById(`${key}-grid`);
                if (!grid) return;
                grid.querySelectorAll('.color-swatch').forEach(s => {
                    if (rgbToHex(s.style.backgroundColor).toLowerCase() === customization[key].toLowerCase()) s.classList.add('active');
                    else s.classList.remove('active');
                });
            });
        }

        function updateJSON() {
            document.getElementById('jsonOutput').textContent = JSON.stringify(customization, null, 2);
        }

        function copyJSON() {
            navigator.clipboard.writeText(JSON.stringify(customization, null, 2));
            alert('JSON copied to clipboard!');
        }

        // --- Rendering Logic ---
        const canvas = document.getElementById('pfpCanvas');
        const ctx = canvas.getContext('2d');

        function render() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            // 1. Draw Background
            drawBackground(ctx, w, h);

            // 2. Draw Ring
            drawRing(ctx, w, h);

            // 3. Draw Shape
            drawShape(ctx, w, h);

            // 4. Draw Accent
            drawAccent(ctx, w, h);

            // 5. Draw Text
            drawText(ctx, w, h);
        }

        function drawBackground(ctx, w, h) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(w/2, h/2, w/2, 0, Math.PI * 2);
            ctx.clip();

            const c1 = customization.color1;
            const c2 = customization.color2;

            switch(customization.bgStyle) {
                case 'solid':
                    ctx.fillStyle = c1;
                    ctx.fillRect(0, 0, w, h);
                    break;
                case 'split_v':
                    ctx.fillStyle = c1; ctx.fillRect(0, 0, w/2, h);
                    ctx.fillStyle = c2; ctx.fillRect(w/2, 0, w/2, h);
                    break;
                case 'split_h':
                    ctx.fillStyle = c1; ctx.fillRect(0, 0, w, h/2);
                    ctx.fillStyle = c2; ctx.fillRect(0, h/2, w, h/2);
                    break;
                case 'diagonal':
                    ctx.fillStyle = c1; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = c2;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
                    break;
                case 'radial':
                    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
                    grad.addColorStop(0, c1); grad.addColorStop(1, c2);
                    ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
                    break;
                case 'stripes':
                    ctx.fillStyle = c1; ctx.fillRect(0, 0, w, h);
                    ctx.fillStyle = c2;
                    for(let i=0; i<w; i+=80) ctx.fillRect(i, 0, 40, h);
                    break;
                case 'grid':
                    ctx.fillStyle = c1; ctx.fillRect(0, 0, w, h);
                    ctx.strokeStyle = c2; ctx.lineWidth = 10;
                    for(let i=0; i<w; i+=100) {
                        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke();
                    }
                    break;
                default:
                    ctx.fillStyle = c1; ctx.fillRect(0, 0, w, h);
            }
            ctx.restore();
        }

        function drawShape(ctx, w, h) {
            if (customization.shape === 'none') return;
            ctx.save();
            ctx.fillStyle = customization.shapeColor;
            const size = (customization.shapeSize / 100) * w;
            const cx = w/2;
            const cy = h/2;

            ctx.beginPath();
            if (customization.shape === 'circle') {
                ctx.arc(cx, cy, size/2, 0, Math.PI * 2);
            } else if (customization.shape === 'square') {
                ctx.rect(cx - size/2, cy - size/2, size, size);
            } else if (customization.shape === 'triangle') {
                ctx.moveTo(cx, cy - size/2);
                ctx.lineTo(cx + size/2, cy + size/2);
                ctx.lineTo(cx - size/2, cy + size/2);
            } else if (customization.shape === 'diamond') {
                ctx.moveTo(cx, cy - size/2);
                ctx.lineTo(cx + size/2, cy);
                ctx.lineTo(cx, cy + size/2);
                ctx.lineTo(cx - size/2, cy);
            } else if (customization.shape === 'hexagon') {
                for(let i=0; i<6; i++) {
                    const angle = (i * Math.PI) / 3;
                    const x = cx + size/2 * Math.cos(angle);
                    const y = cy + size/2 * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
            } else if (customization.shape === 'star') {
                for(let i=0; i<10; i++) {
                    const r = (i % 2 === 0) ? size/2 : size/4;
                    const angle = (i * Math.PI) / 5 - Math.PI/2;
                    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
                }
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawRing(ctx, w, h) {
            if (customization.ring === 'none') return;
            ctx.save();
            ctx.strokeStyle = customization.ringColor;
            ctx.lineWidth = 20;
            const r = (w/2) - 10;

            if (customization.ring === 'dashed') ctx.setLineDash([40, 20]);
            else if (customization.ring === 'dots') ctx.setLineDash([5, 25]);
            else ctx.setLineDash([]);

            ctx.beginPath();
            ctx.arc(w/2, h/2, r, 0, Math.PI * 2);
            ctx.stroke();

            if (customization.ring === 'double') {
                ctx.beginPath();
                ctx.arc(w/2, h/2, r - 30, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawAccent(ctx, w, h) {
            if (customization.accent === 'none') return;
            ctx.save();
            ctx.fillStyle = customization.accentColor;
            const cx = w/2;
            const cy = h/2;
            
            if (customization.accent === 'sparkle') {
                for(let i=0; i<4; i++) {
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(i * Math.PI / 2);
                    ctx.beginPath();
                    ctx.ellipse(w*0.35, 0, 15, 40, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
            ctx.restore();
        }

        function drawText(ctx, w, h) {
            const chars = customization.initials.split('');
            if (chars.length === 0) return;

            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            const fontName = fontMap[customization.font] || 'Inter, sans-serif';
            ctx.font = `bold ${w/4}px ${fontName}`;
            
            const totalWidth = chars.length * (w/5);
            let startX = (w / 2) - (totalWidth / 2) + (w/10);

            chars.forEach((char, i) => {
                ctx.fillStyle = customization[`textColor${i+1}`] || customization.textColor1;
                ctx.fillText(char, startX + (i * (w/5)), h/2);
            });
            ctx.restore();
        }

        // --- Helpers ---
        function rgbToHex(rgb) {
            if (!rgb) return '#ffffff';
            if (rgb.startsWith('#')) return rgb;
            const match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
            if (!match) return '#ffffff';
            const r = parseInt(match[1]).toString(16).padStart(2, '0');
            const g = parseInt(match[2]).toString(16).padStart(2, '0');
            const b = parseInt(match[3]).toString(16).padStart(2, '0');
            return `#${r}${g}${b}`;
        }

        // --- Run ---
        window.onload = init;
    </script>
</body>
</html>
