<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arguuu — Profile Generator Reverse Engineer</title>
  <link rel="icon" type="image/png" href="arguuu_logo.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&family=Space+Mono:wght@400;700&family=Anton&family=Orbitron:wght@400;700&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --bg-cream: #faf6f0;
      --sand: #e8ddd0;
      --tan: #c9b99e;
      --ink: #1a110a;
      --text: #3d2b1f;
    }

    body {
      font-family: 'Lora', serif;
      background: var(--bg-cream);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      margin-bottom: 2rem;
    }

    .tool-container {
      display: flex;
      gap: 4rem;
      max-width: 1200px;
      width: 100%;
      background: #fff;
      padding: 3rem;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.05);
      border: 1px solid var(--sand);
    }

    .input-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .output-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      border-left: 1px solid var(--sand);
      padding-left: 4rem;
    }

    label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tan);
    }

    textarea {
      width: 100%;
      height: 400px;
      padding: 1.5rem;
      border-radius: 12px;
      border: 1.5px solid var(--sand);
      background: #fdf9f4;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      resize: none;
    }

    /* ── PROFILE RENDERER ── */
    #profileCanvas {
      width: 300px;
      height: 300px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    }

    .profile-initials {
      position: relative;
      z-index: 10;
      font-size: 5rem;
      color: #fff;
      pointer-events: none;
    }

    .profile-ring {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
    }

    .accent-icon {
      position: absolute;
      bottom: 20%;
      right: 20%;
      z-index: 15;
      width: 40px;
      height: 40px;
    }

    /* Pattern Overlays */
    .pattern-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .tool-container { flex-direction: column; padding: 1.5rem; }
      .output-pane { border-left: none; padding-left: 0; border-top: 1px solid var(--sand); padding-top: 2rem; }
    }
  </style>
</head>
<body>

<h1>Profile Generator <em>Reverse.</em></h1>

<div class="tool-container">
  <div class="input-pane">
    <label>Profile JSON Input</label>
    <textarea id="jsonInput">{
  "bgStyle": "diagonal",
  "color1": "#C94080",
  "color2": "#111827",
  "font": "monument",
  "initials": "KC",
  "ring": "double",
  "ringColor": "#FFFFFF",
  "accent": "star",
  "accentColor": "#FFD700"
}</textarea>
  </div>

  <div class="output-pane">
    <label>Live Rendered Profile</label>
    <div id="profileCanvas">
      <div id="bgPattern" class="pattern-overlay"></div>
      <div id="ringOverlay" class="profile-ring"></div>
      <div id="initialsDisplay" class="profile-initials">KC</div>
      <div id="accentDisplay" class="accent-icon"></div>
    </div>
    <p id="errorMsg" style="color: red; font-family: 'DM Mono', monospace; font-size: 0.7rem; display: none;">Invalid JSON format</p>
  </div>
</div>

<script>
  const jsonInput = document.getElementById('jsonInput');
  const profileCanvas = document.getElementById('profileCanvas');
  const bgPattern = document.getElementById('bgPattern');
  const ringOverlay = document.getElementById('ringOverlay');
  const initialsDisplay = document.getElementById('initialsDisplay');
  const accentDisplay = document.getElementById('accentDisplay');
  const errorMsg = document.getElementById('errorMsg');

  const fontMap = {
    'serif': "'Playfair Display', serif",
    'monument': "'Orbitron', sans-serif", // Approximate
    'anton': "'Anton', sans-serif",
    'spaceMono': "'Space Mono', monospace",
    'dancing': "cursive",
    'sausage': "cursive"
  };

  function renderProfile() {
    try {
      const data = JSON.parse(jsonInput.value);
      errorMsg.style.display = 'none';

      // 1. Base Background
      profileCanvas.style.background = data.color1;
      
      // 2. Pattern
      let patternHtml = '';
      const c1 = data.color1;
      const c2 = data.color2;

      if (data.bgStyle === 'grid') {
        patternHtml = `<svg width="100%" height="100%"><defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="${c2}" stroke-width="0.5" opacity="0.3"/></pattern></defs><rect width="100%" height="100%" fill="url(#grid)"/></svg>`;
      } else if (data.bgStyle === 'diagonal') {
        patternHtml = `<svg width="100%" height="100%"><defs><pattern id="diag" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="10" stroke="${c2}" stroke-width="5" opacity="0.4"/></pattern></defs><rect width="100%" height="100%" fill="url(#diag)"/></svg>`;
      } else if (data.bgStyle === 'stripes') {
        patternHtml = `<svg width="100%" height="100%"><defs><pattern id="stripes" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="20" height="40" fill="${c2}" opacity="0.2"/></pattern></defs><rect width="100%" height="100%" fill="url(#stripes)"/></svg>`;
      } else if (data.bgStyle === 'dots_grid') {
        patternHtml = `<svg width="100%" height="100%"><defs><pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="2" fill="${c2}" opacity="0.4"/></pattern></defs><rect width="100%" height="100%" fill="url(#dots)"/></svg>`;
      } else if (data.bgStyle === 'waves') {
        patternHtml = `<svg width="100%" height="100%"><defs><pattern id="waves" width="50" height="20" patternUnits="userSpaceOnUse"><path d="M0 10 Q12.5 0 25 10 T50 10" fill="none" stroke="${c2}" stroke-width="2" opacity="0.3"/></pattern></defs><rect width="100%" height="100%" fill="url(#waves)"/></svg>`;
      } else if (data.bgStyle === 'mesh') {
        profileCanvas.style.background = `radial-gradient(at 0% 0%, ${c1} 0%, transparent 50%), radial-gradient(at 100% 0%, ${c2} 0%, transparent 50%), radial-gradient(at 100% 100%, ${c1} 0%, transparent 50%), radial-gradient(at 0% 100%, ${c2} 0%, transparent 50%)`;
        profileCanvas.style.backgroundColor = c1;
      } else if (data.bgStyle === 'radial') {
        patternHtml = `<div style="width:100%; height:100%; background: radial-gradient(circle, ${c2} 0%, ${c1} 70%); opacity: 0.8;"></div>`;
      } else if (data.bgStyle === 'split_v') {
        patternHtml = `<div style="width:100%; height:100%; display:flex;"><div style="flex:1; background:${c1}"></div><div style="flex:1; background:${c2}"></div></div>`;
      }

      bgPattern.innerHTML = patternHtml;

      // 3. Ring
      ringOverlay.style.border = 'none';
      ringOverlay.style.boxShadow = 'none';
      if (data.ring === 'solid') {
        ringOverlay.style.border = `8px solid ${data.ringColor}`;
      } else if (data.ring === 'double') {
        ringOverlay.style.border = `4px solid ${data.ringColor}`;
        ringOverlay.style.outline = `4px solid ${data.ringColor}`;
        ringOverlay.style.outlineOffset = `4px`;
      } else if (data.ring === 'dots') {
        ringOverlay.style.border = `6px dotted ${data.ringColor}`;
      } else if (data.ring === 'notched') {
        ringOverlay.style.border = `8px dashed ${data.ringColor}`;
      }

      // 4. Initials
      initialsDisplay.innerText = data.initials || '';
      initialsDisplay.style.fontFamily = fontMap[data.font] || 'sans-serif';
      initialsDisplay.style.color = data.initialsColor || '#FFFFFF';

      // 5. Accent
      accentDisplay.innerHTML = '';
      if (data.accent === 'star') {
        accentDisplay.innerHTML = `<svg viewBox="0 0 24 24" fill="${data.accentColor}"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
      } else if (data.accent === 'heart') {
        accentDisplay.innerHTML = `<svg viewBox="0 0 24 24" fill="${data.accentColor}"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
      } else if (data.accent === 'sparkle') {
        accentDisplay.innerHTML = `<svg viewBox="0 0 24 24" fill="${data.accentColor}"><path d="M12 2L14 8L20 10L14 12L12 18L10 12L4 10L10 8L12 2Z"/></svg>`;
      } else if (data.accent === 'leaf') {
        accentDisplay.innerHTML = `<svg viewBox="0 0 24 24" fill="${data.accentColor}"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/></svg>`;
      }

    } catch (e) {
      errorMsg.style.display = 'block';
    }
  }

  jsonInput.addEventListener('input', renderProfile);
  renderProfile();
</script>

</body>
</html>
