<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arguuu — The Arena Feed | Explore Active Motions</title>
  <meta name="description" content="Browse the latest debate topics in the Arguuu arena. Pick your side, build your argument, and join the clash of perspectives.">
  <link rel="icon" type="image/png" href="arguuu_logo.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --cream: #faf6f0;
      --warm-white: #fdf9f4;
      --sand: #e8ddd0;
      --tan: #c9b99e;
      --terracotta: #c4724a;
      --rust: #a85535;
      --brown: #5c3d2e;
      --dark: #2a1f17;
      --text: #3d2b1f;
      --text-light: #7a5c4a;
      --ink: #1a110a;
      --for-blue: #1a5fa8;
      --against-rust: #a85535;
      --radius: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lora', Georgia, serif;
      background-color: var(--cream);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav.site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 4rem;
      background: rgba(250,246,240,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--sand);
    }
  
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--ink);
      letter-spacing: -0.02em;
      text-decoration: none;
    }
    .nav-logo span.for { color: var(--for-blue); }
    .nav-logo span.against { color: var(--against-rust); }

    /* ── HEADER ── */
    header.feed-header {
      padding: 120px 4rem 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .feed-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 2rem;
    }

    /* ── TABS ── */
    .feed-tabs {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--sand);
      padding-bottom: 1rem;
    }

    .tab-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--tan);
      cursor: pointer;
      padding: 0.5rem 0;
      position: relative;
      transition: color 0.3s;
    }

    .tab-item.active {
      color: var(--ink);
      font-weight: 600;
    }

    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: -1.1rem;
      left: 0; right: 0;
      height: 2px;
      background: var(--terracotta);
    }

    /* ── FILTERS ── */
    .filter-scroll {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      scrollbar-width: none; /* Firefox */
    }
    .filter-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */

    .filter-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.6rem 1.2rem;
      background: var(--warm-white);
      border: 1px solid var(--sand);
      border-radius: 30px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-light);
    }

    .filter-pill:hover {
      border-color: var(--tan);
      color: var(--ink);
    }

    .filter-pill.active {
      background: var(--dark);
      border-color: var(--dark);
      color: var(--cream);
    }

    /* ── GRID ── */
    .motion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4rem 100px;
    }

    .motion-card {
      background: var(--warm-white);
      border: 1px solid var(--sand);
      border-radius: var(--radius);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .motion-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(42,31,23,0.08);
      border-color: var(--tan);
    }

    .motion-category {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--terracotta);
      margin-bottom: 1rem;
    }

    .motion-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      line-height: 1.3;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    .motion-stats {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--tan);
    }

    .motion-badge {
      padding: 0.3rem 0.6rem;
      background: rgba(26, 95, 168, 0.05);
      color: var(--for-blue);
      border-radius: 4px;
      font-size: 0.6rem;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      padding: 3rem 4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 900;
      color: var(--cream);
      text-decoration: none;
    }

    @media (max-width: 768px) {
      nav.site-nav { padding: 1rem 1.5rem; }
      header.feed-header { padding: 100px 1.5rem 20px; }
      .motion-grid { padding: 0 1.5rem 60px; grid-template-columns: 1fr; }
      .feed-tabs { gap: 1rem; }
      footer { flex-direction: column; gap: 2rem; padding: 2rem; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">
    Arg<span class="for">u</span><span class="against">u</span>u
  </a>
  <a href="https://play.google.com/store/apps/details?id=com.arguuu.app" target="_blank" style="font-family: 'DM Mono', monospace; font-size: 0.7rem; text-transform: uppercase; color: var(--ink); text-decoration: none; border: 1px solid var(--sand); padding: 0.6rem 1.2rem; border-radius: 30px;">Get App</a>
</nav>

<header class="feed-header">
  <div class="section-label" style="margin-bottom: 1rem;">The Arena Feed</div>
  <h1>Current <em>Motions.</em></h1>
  
  <div class="feed-tabs">
    <div class="tab-item active" data-tab="all">All</div>
    <div class="tab-item" data-tab="trending">Trending</div>
    <div class="tab-item" data-tab="newest">Newest</div>
  </div>

  <div class="filter-scroll" id="filterBar">
    <div class="filter-pill active" data-filter="all">All Topics</div>
    <div class="filter-pill" data-filter="politics">Politics</div>
    <div class="filter-pill" data-filter="movie">Movie & TV</div>
    <div class="filter-pill" data-filter="sports">Sports</div>
    <div class="filter-pill" data-filter="tech">Tech</div>
    <div class="filter-pill" data-filter="philosophy">Philosophy</div>
    <div class="filter-pill" data-filter="relationships">Relationships</div>
    <div class="filter-pill" data-filter="health">Health</div>
    <div class="filter-pill" data-filter="gaming">Gaming</div>
    <div class="filter-pill" data-filter="science">Science</div>
    <div class="filter-pill" data-filter="law">Law</div>
    <div class="filter-pill" data-filter="others">Others</div>
    <div class="filter-pill" data-filter="adult">Adult</div>
  </div>
</header>

<div class="motion-grid" id="motionGrid">
  <!-- Topics will be injected here -->
</div>

<footer>
  <a href="index.html" class="footer-logo">Arg<span class="for">u</span><span class="against">u</span>u</a>
  <p style="font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--tan);">© 2026 Blue Particle Studios</p>
</footer>

<script>
  const motions = [
    { title: "Misandry does not exist", category: "relationships", stats: "142 arguing" },
    { title: "fnaf or poppy playtime", category: "gaming", stats: "2.4k arguing" },
    { title: "free will doesnt exist", category: "philosophy", stats: "856 arguing" },
    { title: "should there be limits on free speech", category: "philosophy", stats: "1.1k arguing" },
    { title: "controlled suicide aint half bad", category: "health", stats: "341 arguing" },
    { title: "tinubu is a relatively goof president", category: "politics", stats: "12k arguing" },
    { title: "abortion", category: "health", stats: "5.6k arguing" },
    { title: "korra is a worse avatar than roku", category: "movie", stats: "942 arguing" },
    { title: "do nice guys actually finish last", category: "relationships", stats: "3.1k arguing" },
    { title: "bts or skz", category: "others", stats: "8.9k arguing" },
    { title: "does nigeria stand a chance at fighting corruption", category: "politics", stats: "4.2k arguing" },
    { title: "nigeria is too hot for overly strict dress codes", category: "others", stats: "1.2k arguing" },
    { title: \"not all men\" is bring ing feminism bakc", category: "relationships", stats: "2.1k arguing" },
    { title: "we need the government", category: "politics", stats: "756 arguing" },
    { title: "misogyny will always be worse than misandry", category: "relationships", stats: "4.5k arguing" },
    { title: "social media is a waste of time", category: "tech", stats: "6.7k arguing" },
    { title: "donald trump or bola tinubu. whos the worse president", category: "politics", stats: "15k arguing" },
    { title: "irish potatoes or sweet potatores", category: "others", stats: "567 arguing" },
    { title: "school is actually overatted", category: "others", stats: "2.3k arguing" }
  ];

  const grid = document.getElementById('motionGrid');
  const filters = document.querySelectorAll('.filter-pill');
  const tabs = document.querySelectorAll('.tab-item');

  function renderMotions(filter = 'all') {
    grid.innerHTML = '';
    const filtered = filter === 'all' ? motions : motions.filter(m => m.category === filter);
    
    filtered.forEach(m => {
      const card = document.createElement('div');
      card.className = 'motion-card';
      card.innerHTML = `
        <div>
          <div class="motion-category">${m.category}</div>
          <div class="motion-title">${m.title}</div>
        </div>
        <div class="motion-stats">
          <span class="motion-badge">Live</span>
          <span>${m.stats}</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  filters.forEach(pill => {
    pill.addEventListener('click', () => {
      filters.forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      renderMotions(pill.dataset.filter);
    });
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      // For now, just re-render the same list
      renderMotions(document.querySelector('.filter-pill.active').dataset.filter);
    });
  });

  renderMotions();
</script>

</body>
</html>
